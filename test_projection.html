<!DOCTYPE html>
<html>
<head>
    <title>Test Ridings Map</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="map"></div>
    <script>
        const width = 975;
        const height = 610;

        const svg = d3.select("#map")
            .append("svg")
            .attr("width", width)
            .attr("height", height)
            .style("border", "1px solid black");

        // Load the ridings data
        d3.json("files/canada-ridings-simple.json").then(function(ridings) {
            console.log("Loaded ridings:", ridings.features.length);

            // Get bounds manually
            let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

            ridings.features.forEach(feature => {
                if (feature.geometry.type === "Polygon") {
                    feature.geometry.coordinates[0].forEach(coord => {
                        minX = Math.min(minX, coord[0]);
                        maxX = Math.max(maxX, coord[0]);
                        minY = Math.min(minY, coord[1]);
                        maxY = Math.max(maxY, coord[1]);
                    });
                } else if (feature.geometry.type === "MultiPolygon") {
                    feature.geometry.coordinates.forEach(polygon => {
                        polygon[0].forEach(coord => {
                            minX = Math.min(minX, coord[0]);
                            maxX = Math.max(maxX, coord[0]);
                            minY = Math.min(minY, coord[1]);
                            maxY = Math.max(maxY, coord[1]);
                        });
                    });
                }
            });

            console.log("Bounds:", {minX, maxX, minY, maxY});

            // Calculate scale to fit
            const padding = 20;
            const scaleX = (width - 2 * padding) / (maxX - minX);
            const scaleY = (height - 2 * padding) / (maxY - minY);
            const scale = Math.min(scaleX, scaleY);

            console.log("Scale:", scale);

            // Create projection that transforms Lambert coordinates to screen
            const projection = d3.geoTransform({
                point: function(x, y) {
                    this.stream.point(
                        (x - minX) * scale + padding,
                        (maxY - y) * scale + padding  // Flip Y axis
                    );
                }
            });

            const path = d3.geoPath().projection(projection);

            // Draw the ridings
            svg.selectAll("path")
                .data(ridings.features)
                .enter()
                .append("path")
                .attr("d", path)
                .attr("fill", (d, i) => d3.schemeCategory10[i % 10])
                .attr("stroke", "white")
                .attr("stroke-width", 0.5)
                .on("mouseover", function(event, d) {
                    d3.select(this).attr("fill", "red");
                    console.log(d.properties.ED_NAMEE);
                })
                .on("mouseout", function(event, d) {
                    d3.select(this).attr("fill", (d, i) => d3.schemeCategory10[ridings.features.indexOf(d) % 10]);
                });

            svg.append("text")
                .attr("x", 10)
                .attr("y", 20)
                .text("Canada Federal Electoral Districts 2025")
                .style("font-family", "sans-serif")
                .style("font-size", "16px");
        });
    </script>
</body>
</html>
